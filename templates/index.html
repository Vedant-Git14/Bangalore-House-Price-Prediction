<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title> House Price Prediction | ML Project</title>
<link rel="icon" href="{{ url_for('static', filename='favicon.ico') }}">

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.0/dist/css/bootstrap.min.css">

<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<nav class="navbar">
<div class="container-fluid">
<span class="logo">🏠 Bangalore House Price Predictor | ML Project</span>
</div>
</nav>

<div class="main-container">

<div class="card prediction-card">

<div class="card-header">
<h2>Predict House Price</h2>
<p>Enter property details to estimate price</p>
</div>

<div class="card-body">

<form action="{{ url_for('predict') }}" method="POST">

<div class="row">

<div class="col-md-6 form-group">
<label>Location</label>
<select class="form-control" name="sLocation" id="uiLocation" required>
{% for location in locations %}
<option value="{{location}}">{{location}}</option>
{% endfor %}
</select>
</div>

<div class="col-md-6 form-group">
<label>BHK</label>
<input type="number" class="form-control" name="uiBHK" placeholder="Enter BHK">
</div>

<div class="col-md-6 form-group">
<label>Area (sqft)</label>
<input type="number" class="form-control" name="Squareft" placeholder="Enter Area">
</div>

<div class="col-md-6 form-group">
<label>Bathrooms</label>
<input type="number" class="form-control" name="uiBathrooms" placeholder="Enter Bathrooms">
</div>

<div class="col-md-12">
<button class="predict-btn">Estimate Price</button>
</div>

</div>

</form>

<div class="result-box">
<h3>{{result}}</h3>
</div>

</div>

</div>

</div>

</body>
</html>
